<div class="login-page mt-4 mb-4">
  <div class="container-fluid login-page__container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4 p-lg-5">
            <h4 class="mb-1">Kodu Doğrulayın</h4>
            <p class="text-muted mb-4">E-posta adresinize gönderilen 8 haneli kodu giriniz. Doğrulama sonrasında şifre sıfırlama bağlantısı mail adresinize gönderilecek.</p>

            <form autocomplete="off" [formGroup]="_passwordCodeForm">
              <div class="mb-3">
                <div class="row twostep-input justify-content-center">
                  <ng-otp-input [config]="config" [formCtrl]="codeControl"></ng-otp-input>
                </div>
              </div>
              <button type="button" class="btn btn-primary w-100 mt-3" (click)="passwordCode()">Doğrula</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0 small">
              <a routerLink="/auth/login" class="text-primary fw-medium">Giriş sayfasına dön</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
