<div class="login-page mt-4 mb-4">
  <div class="container-fluid login-page__container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4 p-lg-5">
            <h4 class="mb-1">Yeni şifre oluşturun</h4>
            <p class="text-muted mb-4">Yeni şifrenizi girin. Şifreniz en az bir büyük harf ve en az 6 karakter içermelidir.</p>

            <form [formGroup]="_passwordResetForm" (ngSubmit)="passwordReset()">
              <div class="mb-3">
                <label class="form-label" for="password-input">Yeni Şifre <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password-input" placeholder="Yeni şifre" maxlength="20"
                  formControlName="newPassword" [class.is-invalid]="_passwordResetForm.get('newPassword')?.invalid && _passwordResetForm.get('newPassword')?.touched">
                <div class="invalid-feedback" *ngIf="_passwordResetForm.get('newPassword')?.errors?.['required'] && _passwordResetForm.get('newPassword')?.touched">
                  Şifre zorunludur.
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label" for="confirm-password-input">Şifre Tekrarı <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="confirm-password-input" placeholder="Şifre tekrarı"
                  formControlName="againNewPassword" [class.is-invalid]="_passwordResetForm.get('againNewPassword')?.invalid && _passwordResetForm.get('againNewPassword')?.touched">
                <div class="invalid-feedback" *ngIf="_passwordResetForm.get('againNewPassword')?.errors?.['required'] && _passwordResetForm.get('againNewPassword')?.touched">
                  Şifre tekrarı zorunludur.
                </div>
              </div>

              <button class="btn btn-primary w-100 mt-3" type="submit">Şifreyi Yenile</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0 small">
              <a routerLink="/auth/login" class="text-primary fw-medium">Giriş sayfasına dön</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
