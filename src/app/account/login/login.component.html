<div class="login-page mt-4 mb-4">
  <div class="container-fluid login-page__container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4 p-lg-5">
            <h4 class="mb-1">Giriş Yap</h4>
            <p class="text-muted mb-4">Hesabınıza giriş yaparak alışverişe devam edebilirsiniz.</p>

            <form [formGroup]="loginForm" (ngSubmit)="login()">
              <div class="mb-3">
                <label class="form-label" for="email">E-posta <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" formControlName="email"
                  placeholder="ornek@email.com" [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <div class="invalid-feedback" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
                  E-posta zorunludur.
                </div>
                <div class="invalid-feedback" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
                  Geçerli bir e-posta giriniz.
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label" for="password-input">Parola <span class="text-danger">*</span></label>
                <input class="form-control" placeholder="Parola" type="password" id="password-input"
                  formControlName="password" [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <div class="invalid-feedback" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">
                  Parola zorunludur.
                </div>
                <div class="mt-1">
                  <a routerLink="/auth/forgot-password/basic" class="text-muted small">Parolanızı mı unuttunuz?</a>
                </div>
              </div>

              <button class="btn btn-primary w-100 mt-3" type="submit">Giriş Yap</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0 small">
              Hesabınız yok mu? <a routerLink="/auth/register" class="text-primary fw-medium">Kayıt olun</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-toasts aria-live="polite" aria-atomic="true"></app-toasts>
