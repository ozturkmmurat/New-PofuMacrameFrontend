<div class="login-page mt-4 mb-4">
  <div class="container-fluid login-page__container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4 p-lg-5">
            <h4 class="mb-1">Parolanızı mı unuttunuz?</h4>
            <p class="text-muted mb-4">E-posta adresinizi girin, şifre sıfırlama talimatları size gönderilecektir.</p>

            <form [formGroup]="_forgotPasswordForm" (ngSubmit)="forgotPassword()">
              <div class="mb-3">
                <label class="form-label" for="email">E-posta <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" formControlName="email"
                  placeholder="ornek@email.com" [class.is-invalid]="_forgotPasswordForm.get('email')?.invalid && _forgotPasswordForm.get('email')?.touched">
                <div class="invalid-feedback" *ngIf="_forgotPasswordForm.get('email')?.errors?.['required'] && _forgotPasswordForm.get('email')?.touched">
                  E-posta zorunludur.
                </div>
                <div class="invalid-feedback" *ngIf="_forgotPasswordForm.get('email')?.errors?.['email'] && _forgotPasswordForm.get('email')?.touched">
                  Geçerli bir e-posta giriniz.
                </div>
              </div>

              <button class="btn btn-primary w-100 mt-3" type="submit">Sıfırlama Bağlantısı Gönder</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0 small">
              Şifrenizi hatırladınız mı? <a routerLink="/auth/login" class="text-primary fw-medium">Giriş yapın</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
